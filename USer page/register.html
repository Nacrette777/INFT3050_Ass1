<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Trade Web</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Password strength bar */
    .strength-track {
      height: 4px;
      background: rgba(138,155,176,0.15);
      border-radius: 999px;
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0;
      border-radius: 999px;
      transition: width 0.3s ease, background 0.3s ease;
    }
    .strength-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      min-height: 1rem;
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="navbar-brand">
      <div class="logo-box">G</div>
      <span class="brand-name">Trade<span>Web</span></span>
    </div>

    <nav class="navbar-center">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" class="search-input" placeholder="Search items, guilds…" />
      </div>
    </nav>

    <div class="navbar-actions">
      <a href="index.html" class="nav-home">Home</a>
      <div id="navUserPill"></div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="page-main">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join the Guild Trading community</p>

      <form id="registerForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="regName">Full Name</label>
          <input
            id="regName"
            type="text"
            class="form-control"
            placeholder="Your full name"
            autocomplete="name"
          />
          <span class="field-error" id="regNameError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="regEmail">Email Address</label>
          <input
            id="regEmail"
            type="email"
            class="form-control"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <span class="field-error" id="regEmailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <div class="password-wrap">
            <input
              id="regPassword"
              type="password"
              class="form-control"
              placeholder="Min. 6 characters"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pass" data-target="regPassword" aria-label="Show password">
              <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <!-- Password strength -->
          <div class="strength-track"><div class="strength-bar" id="passStrengthBar"></div></div>
          <div class="strength-label" id="passStrengthLabel"></div>
          <span class="field-error" id="regPassError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="regConfirm">Confirm Password</label>
          <div class="password-wrap">
            <input
              id="regConfirm"
              type="password"
              class="form-control"
              placeholder="Re-enter your password"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-pass" data-target="regConfirm" aria-label="Show confirm password">
              <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="regConfirmError"></span>
        </div>

        <button type="submit" id="registerBtn" class="btn-primary">Create Account</button>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </form>
    </div>
  </main>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script>initRegisterPage();</script>
</body>
</html>
