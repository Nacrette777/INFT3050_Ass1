<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – Trade Web</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="navbar-brand">
      <div class="logo-box">G</div>
      <span class="brand-name">Trade<span>Web</span></span>
    </div>

    <nav class="navbar-center">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" class="search-input" placeholder="Search items, guilds…" />
      </div>
    </nav>

    <div class="navbar-actions">
      <a href="index.html" class="nav-home">Home</a>
      <div id="navUserPill"></div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main style="flex:1; padding: 0;">
    <div class="profile-layout">

      <!-- LEFT: Orders -->
      <section class="profile-main">

        <!-- Recent Orders Card -->
        <div class="section-card">
          <div class="section-header">
            <h2 class="section-title">Order History</h2>
            <span class="section-badge" id="orderCount">0</span>
          </div>

          <table class="orders-table" aria-label="Order history">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Item</th>
                <th>Date</th>
                <th>Total</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <tr>
                <td colspan="5">
                  <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
                      fill="none" stroke="currentColor" stroke-width="1.5">
                      <circle cx="12" cy="12" r="10"/>
                      <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <p>Loading your orders…</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Activity Summary -->
        <div class="section-card">
          <div class="section-header">
            <h2 class="section-title">Account Summary</h2>
          </div>
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; padding: 1.5rem;">
            <div class="stat-box" style="text-align:center;">
              <div class="stat-number" id="statCompleted">—</div>
              <div class="stat-label">Completed Orders</div>
            </div>
            <div class="stat-box" style="text-align:center;">
              <div class="stat-number" id="statSpent">—</div>
              <div class="stat-label">Total Spent</div>
            </div>
            <div class="stat-box" style="text-align:center;">
              <div class="stat-number" style="color:var(--success);">Active</div>
              <div class="stat-label">Account Status</div>
            </div>
          </div>
        </div>

      </section>

      <!-- RIGHT: Profile Card -->
      <aside>
        <div class="profile-card">
          <div class="profile-avatar-large" id="profileInitials">?</div>
          <div class="profile-name"  id="profileName">Loading…</div>
          <div class="profile-email" id="profileEmail"></div>
          <div class="profile-badge">Trade Member</div>

          <div class="profile-stats">
            <div class="stat-box">
              <div class="stat-number" id="statCompleted2">—</div>
              <div class="stat-label">Orders</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" style="color:var(--success);">✓</div>
              <div class="stat-label">Verified</div>
            </div>
          </div>

          <div style="margin-top: 1.25rem; display:flex; flex-direction:column; gap:0.6rem;">
            <button
              onclick="window.location.href='login.html'"
              style="display:none"
              id="btnLogin"
              class="btn-primary"
              style="margin-top:0">
              Sign In
            </button>
            <button
              onclick="logout()"
              class="btn-logout"
              style="width:100%; padding:0.6rem; margin-top:0.75rem; border-radius:6px;">
              Log Out
            </button>
          </div>
        </div>
      </aside>

    </div>
  </main>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script>initProfilePage();</script>
</body>
</html>
