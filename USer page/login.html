<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Trade Web</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="navbar-brand">
      <div class="logo-box">G</div>
      <span class="brand-name">Trade<span>Web</span></span>
    </div>

    <nav class="navbar-center">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" class="search-input" placeholder="Search items, guilds…" />
      </div>
    </nav>

    <div class="navbar-actions">
      <a href="index.html" class="nav-home">Home</a>
      <div id="navUserPill"></div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="page-main">
    <div class="auth-card">
      <h1 class="auth-title">Sign In</h1>
      <p class="auth-subtitle">Access your Guild Trading account</p>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input
            id="loginEmail"
            type="email"
            class="form-control"
            placeholder="you@example.com"
            autocomplete="email"
          />
          <span class="field-error" id="loginEmailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="password-wrap">
            <input
              id="loginPassword"
              type="password"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pass" data-target="loginPassword" aria-label="Show password">
              <!-- eye open -->
              <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- eye closed -->
              <svg class="eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="loginPassError"></span>
        </div>

        <button type="submit" id="loginBtn" class="btn-primary">Sign In</button>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
      </form>
    </div>
  </main>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script>initLoginPage();</script>
</body>
</html>
